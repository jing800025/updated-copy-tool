<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>剪贴板输入</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: #f2f2f7;
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
      display: flex;
      flex-direction: column;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100dvh; /* 动态视口高度，兼容移动端地址栏 */
      padding: 12px 12px 16px 12px;
      gap: 12px;
    }

    /* 文字输入区 */
    #inputArea {
      flex: 1;
      width: 100%;
      resize: none;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 17px;
      line-height: 1.6;
      color: #1c1c1e;
      background: #ffffff;
      outline: none;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      caret-color: #007aff;
      -webkit-appearance: none;
    }

    #inputArea::placeholder {
      color: #c7c7cc;
    }

    /* 字数统计 */
    .word-count {
      text-align: right;
      font-size: 13px;
      color: #8e8e93;
      padding-right: 4px;
      margin-top: -6px;
    }

    /* 底部按钮区 */
    .actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 15px 0;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: 0.5px;
    }

    .btn:active {
      opacity: 0.75;
    }

    .btn-copy {
      background: #007aff;
      color: #ffffff;
    }

    .btn-clear {
      background: #e5e5ea;
      color: #3a3a3c;
    }

    /* 复制成功提示 */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(0,0,0,0.72);
      color: #fff;
      padding: 10px 22px;
      border-radius: 20px;
      font-size: 14px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <textarea
      id="inputArea"
      placeholder="在此输入文字…"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    ></textarea>

    <div class="word-count" id="wordCount">0 字</div>

    <div class="actions">
      <button class="btn btn-copy" onclick="copyText()">📋 复制到剪贴板</button>
      <button class="btn btn-clear" onclick="clearText()">🗑 清空</button>
    </div>
  </div>

  <div class="toast" id="toast">✅ 已复制到剪贴板！</div>

  <script>
    const inputArea = document.getElementById('inputArea');
    const wordCount = document.getElementById('wordCount');
    const toast    = document.getElementById('toast');

    // 实时字数统计
    inputArea.addEventListener('input', () => {
      const len = inputArea.value.length;
      wordCount.textContent = len + ' 字';
    });

    // 复制
    function copyText() {
      const text = inputArea.value;
      if (!text) return;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(showToast).catch(fallbackCopy);
      } else {
        fallbackCopy();
      }
    }

    function fallbackCopy() {
      inputArea.select();
      document.execCommand('copy');
      showToast();
    }

    // 清空
    function clearText() {
      inputArea.value = '';
      wordCount.textContent = '0 字';
      inputArea.focus();
    }

    // Toast 提示
    let toastTimer;
    function showToast() {
      clearTimeout(toastTimer);
      toast.classList.add('show');
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
