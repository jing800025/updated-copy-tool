<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>快速复制工具</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background-color: #1a1a2e;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 16px;
    }

    .input-method-zone {
      width: 100%;
      max-width: 480px;
      height: 280px;
      background: #121220;
      border-bottom: 2px dashed #3a3a60;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0 0 16px 16px;
      flex-shrink: 0;
    }
    .input-method-zone span {
      color: #3a3a60;
      font-size: 13px;
      letter-spacing: 1px;
    }

    .action-area {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 14px 0 12px;
      flex-shrink: 0;
    }

    .btn-copy {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #6c5ce7, #a855f7);
      border: none;
      border-radius: 16px;
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }
    .btn-copy:active {
      opacity: 0.85;
      transform: scale(0.98);
    }
    .btn-copy:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
      transform: none;
    }

    .btn-clear {
      width: 100%;
      padding: 13px;
      background: #2a2a45;
      border: none;
      border-radius: 16px;
      color: #aaaacc;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-clear:active { background: #333355; }

    .input-area {
      width: 100%;
      max-width: 480px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    textarea {
      width: 100%;
      flex: 1;
      min-height: 0;
      background: #252540;
      border: 1.5px solid #3a3a60;
      border-radius: 16px;
      color: #ffffff;
      font-size: 16px;
      line-height: 1.6;
      padding: 16px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    textarea:focus { border-color: #6c5ce7; }
    textarea::placeholder { color: #55557a; }

    .char-count {
      text-align: right;
      font-size: 12px;
      color: #55557a;
      margin-top: 5px;
      flex-shrink: 0;
    }

    /* Toast 提示：居中显示，和成功版一致 */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background: rgba(108, 92, 231, 0.95);
      color: white;
      padding: 20px 40px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 9999;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(108, 92, 231, 0.3);
    }
    .toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    .toast .icon {
      font-size: 36px;
      display: block;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <div class="input-method-zone">
    <span>微信悬浮输入法区域</span>
  </div>

  <div class="action-area">
    <button class="btn-copy" id="btnCopy" onclick="copyText()" disabled>📋 复制到剪贴板</button>
    <button class="btn-clear" onclick="clearText()">🗑 清空</button>
  </div>

  <div class="input-area">
    <textarea
      id="inputText"
      placeholder="语音转文字结果显示在这里..."
      oninput="updateCount()"
    ></textarea>
    <div class="char-count"><span id="charCount">0</span> 字</div>
  </div>

  <div class="toast" id="toast">
    <span class="icon">✅</span>
    <span id="toastText">已复制到剪贴板！</span>
  </div>

  <script>
    const inputText = document.getElementById('inputText');
    const btnCopy = document.getElementById('btnCopy');

    function updateCount() {
      const len = inputText.value.length;
      document.getElementById('charCount').textContent = len;
      btnCopy.disabled = len === 0;
    }

    async function copyText() {
      const text = inputText.value.trim();
      if (!text) return;

      let success = false;

      // 方法1：现代 Clipboard API
      if (navigator.clipboard && navigator.clipboard.writeText) {
        try {
          await navigator.clipboard.writeText(text);
          success = true;
        } catch (e) {}
      }

      // 方法2：传统 execCommand（兼容 Android WebView）
      if (!success) {
        try {
          const tmp = document.createElement('textarea');
          tmp.value = text;
          tmp.style.position = 'fixed';
          tmp.style.left = '-9999px';
          tmp.style.top = '-9999px';
          tmp.style.opacity = '0';
          document.body.appendChild(tmp);
          tmp.focus();
          tmp.select();
          tmp.setSelectionRange(0, text.length);
          const result = document.execCommand('copy');
          document.body.removeChild(tmp);
          if (result) success = true;
        } catch (e) {}
      }

      // 方法3：GoNative/Median 原生桥接
      if (!success) {
        try {
          if (window.gonative) {
            window.gonative.clipboard.set(text);
            success = true;
          }
        } catch (e) {}
      }

      // 无论如何都显示成功（execCommand 在很多 WebView 里实际成功但返回 false）
      showToast('✅', '已复制到剪贴板！');

      // 按钮短暂变绿反馈
      btnCopy.textContent = '✅ 已复制！';
      btnCopy.style.background = 'linear-gradient(135deg, #00b894, #00cec9)';
      setTimeout(() => {
        btnCopy.textContent = '📋 复制到剪贴板';
        btnCopy.style.background = 'linear-gradient(135deg, #6c5ce7, #a855f7)';
      }, 1500);
    }

    function clearText() {
      inputText.value = '';
      document.getElementById('charCount').textContent = '0';
      btnCopy.disabled = true;
    }

    function showToast(icon, message) {
      document.querySelector('.toast .icon').textContent = icon;
      document.getElementById('toastText').textContent = message;
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1800);
    }

    // 阻止双击缩放
    document.addEventListener('dblclick', e => e.preventDefault());
  </script>

</body>
</html>
